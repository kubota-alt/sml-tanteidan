<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>科学メディアリテラシー探偵団</title>
<style>
:root{
  --bg:#eef2f7; --ink:#1f2937; --sub:#6b7280; --line:#e5e7eb;
  --accent:#4f46e5; --accent2:#db2777;
  --what:#ef4444; --who:#34d399; --how:#fbbf24;
  --purple:#7c3aed;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",Meiryo,sans-serif;
  background:linear-gradient(160deg,#dbeafe,#fce7f3); color:var(--ink); min-height:100vh;
}
button{font-family:inherit;}
/* ---------- header ---------- */
#hdr{
  position:sticky; top:0; z-index:50; background:linear-gradient(90deg,#4f46e5,#7c3aed);
  color:#fff; display:flex; align-items:center; gap:10px; padding:10px 16px; flex-wrap:wrap;
}
#hdr .logo{font-size:22px;}
#hdr .ttl{font-weight:800; font-size:15px; flex:1; min-width:180px;}
#hdr .score{background:rgba(255,255,255,.22); border-radius:999px; padding:5px 14px; font-weight:800; font-size:13px; white-space:nowrap;}
#hdr nav{display:flex; gap:6px;}
#hdr nav button{
  background:rgba(255,255,255,.15); color:#fff; border:none; border-radius:10px;
  padding:7px 12px; font-size:13px; font-weight:700; cursor:pointer;
}
#hdr nav button.on{background:#fff; color:var(--accent);}
#main{max-width:1160px; margin:0 auto; padding:18px 14px 60px;}
/* ---------- cards ---------- */
.card{background:#fff; border-radius:18px; padding:20px; margin-bottom:16px; box-shadow:0 3px 12px rgba(79,70,229,.09);}
.h1{font-size:22px; font-weight:800; line-height:1.5;}
.h2{font-size:16px; font-weight:800; margin-bottom:8px;}
.small{font-size:12.5px; color:var(--sub); line-height:1.8;}
.btn{
  display:inline-block; background:var(--accent); color:#fff; border:none; border-radius:12px;
  padding:12px 20px; font-size:15px; font-weight:800; cursor:pointer; text-align:center;
  transition:transform .1s;
}
.btn:active{transform:scale(.97);}
.btn.pink{background:var(--accent2);}
.btn.ghost{background:#eef2ff; color:var(--accent);}
.btn.wide{display:block; width:100%;}
.menu-item{display:flex; align-items:center; gap:16px; cursor:pointer;}
.menu-item .mi{font-size:38px; width:60px; height:60px; display:flex; align-items:center; justify-content:center; background:#eef2ff; border-radius:16px; flex-shrink:0;}
.menu-item .mt{font-size:17px; font-weight:800;}
.menu-item .md{font-size:12.5px; color:var(--sub); margin-top:3px; line-height:1.7;}
.menu-item .arrow{margin-left:auto; color:var(--sub); font-size:20px;}
.newscard{display:flex; align-items:center; gap:14px; cursor:pointer;}
.newscard .ni{font-size:32px; width:54px; height:54px; display:flex; align-items:center; justify-content:center; background:#f1f5f9; border-radius:14px; flex-shrink:0;}
.newscard .nt{font-weight:800; font-size:15px;}
.newscard .bulbs{display:flex; gap:3px; margin-top:5px;}
.tagline{display:inline-block; font-size:10.5px; font-weight:800; border-radius:6px; padding:2px 8px; margin-right:6px; vertical-align:middle;}
.tagline.tate{background:#dbeafe; color:#1d4ed8;}
.tagline.yoko{background:#fce7f3; color:#be185d;}
/* ---------- stage layout ---------- */
.stagewrap{display:flex; gap:18px; align-items:flex-start; justify-content:center;}
.phonecol{flex:0 1 440px; min-width:0;}
.banner{background:#fff7ed; border:2px dashed #fdba74; border-radius:14px; padding:10px 14px; font-size:13px; font-weight:700; line-height:1.8; margin-bottom:10px;}
/* ---------- phone ---------- */
.phone{background:#111; border-radius:34px; padding:10px 10px 16px; box-shadow:0 10px 30px rgba(0,0,0,.3);}
.bezel{height:44px; display:flex; align-items:center; justify-content:center; gap:8px;}
.pbody{background:#fff; border-radius:22px; overflow:hidden; display:flex; flex-direction:column; height:min(72vh,760px); min-height:480px;}
.ptabs{display:flex; background:#d7dbe0; padding:6px 6px 0; gap:2px; overflow-x:auto; flex-shrink:0;}
.ptab{background:#e8eaee; border:none; border-radius:10px 10px 0 0; padding:8px 14px; font-size:12.5px; font-weight:700; color:#555; cursor:pointer; white-space:nowrap; max-width:130px; overflow:hidden; text-overflow:ellipsis;}
.ptab.on{background:#fff; color:#111;}
.pscreen{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; background:#fff;}
/* ---------- SNS content ---------- */
.sns{font-size:14.5px; line-height:1.9;}
.sns .authrow{display:flex; align-items:center; gap:10px; padding:12px 14px; border-bottom:1.5px solid #222;}
.sns .authrow .av{width:40px; height:40px; border-radius:50%; border:2.5px solid #222; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; background:#fff;}
.sns .authrow .an{font-size:17px; font-weight:800;}
.sns .authrow .follow{margin-left:auto; border:1.5px solid #7dd3fc; color:#38bdf8; border-radius:8px; padding:3px 12px; font-size:12px; font-weight:700; background:#fff;}
.sns .authrow .dots{color:#333; font-weight:800; letter-spacing:2px;}
.sns .sec{padding:12px 14px; border-bottom:1.5px solid #222;}
.sns .title{font-size:17px; font-weight:800; line-height:1.7;}
.sns .date{text-align:right; font-size:12px; color:#444;}
.plink{color:var(--purple); font-weight:800; cursor:pointer; text-decoration:none;}
a.plink{text-decoration:underline;}
.morelink{color:var(--purple); font-weight:800; cursor:pointer; text-decoration:underline;}
.statsrow{padding:10px 14px; border-bottom:1.5px solid #222;}
.statsrow .icons{font-size:20px; letter-spacing:14px; color:#111;}
.statsrow .nums{font-size:16px; font-weight:700; margin-top:4px; display:flex; gap:26px;}
.cmt{display:flex; gap:10px; padding:10px 14px; border-bottom:1px solid #444;}
.cmt .av{width:34px; height:34px; border-radius:50%; border:2px solid #222; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0;}
.cmt .cn{color:#3b6ea5; font-weight:700; font-size:13.5px;}
.cmt .ct{font-size:13.5px; line-height:1.8;}
.endrow{padding:16px 14px 26px; text-align:right;}
.endrow button{background:#fff; border:2.5px solid #111; border-radius:12px; padding:8px 16px; font-size:15px; font-weight:800; cursor:pointer;}
.paperbox{border:1.5px solid #999; border-radius:8px; margin:10px 0; padding:10px; background:#fdfdfd; font-size:12px; line-height:1.8;}
.paperbox .ptag{display:inline-block; background:#f4978e; color:#7f1d1d; font-size:10.5px; font-weight:800; padding:2px 10px; border-radius:3px;}
.paperbox h4{font-size:13.5px; text-align:center; margin:8px 0 2px; line-height:1.7;}
.paperbox .pauth{text-align:center; color:#444;}
.paperbox .pen{text-align:center; font-size:10.5px; color:#555;}
.notebox{display:block; border:2.5px solid #888; border-radius:14px; margin:12px 0; padding:12px; font-size:13px; line-height:1.9; background:#fafafa;}
.notebox .nb-h{color:#555; font-size:12px; margin-bottom:6px;}
.photo{display:block; position:relative; margin:10px 0;}
.photo img{width:100%; border-radius:10px; display:block;}
.graphbox{display:block; border:1.5px solid #7dd3fc; border-radius:10px; padding:6px; margin:10px 0; position:relative;}
.srcpage{padding:16px 14px 30px; font-size:14.5px; line-height:2;}
.srcpage .site{ text-align:right; font-size:12.5px; color:#333; font-weight:700; margin-bottom:8px;}
.srcpage h3{font-size:16.5px; line-height:1.7; margin-bottom:8px; text-decoration:underline;}
.srcpage h3.ctr{text-align:center; text-decoration:none;}
.srcpage .sh{font-weight:800; text-align:center; margin-top:10px;}
.govlogo{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
.govlogo .gl{font-size:34px;}
.govlogo .gt{font-weight:800; font-size:20px;}
.govlogo .ge{font-size:10.5px; color:#555;}
.wikilogo{background:#e0f2fe; color:#0369a1; font-weight:800; display:inline-block; padding:6px 14px; border-radius:8px; margin-bottom:10px; font-size:14px;}
.searchhead{display:flex; align-items:center; gap:10px; padding:12px 14px; background:#f8fafc; border-bottom:1px solid var(--line);}
.searchhead .slogo{font-weight:900; font-size:20px;}
.searchhead .slogo span:nth-child(1){color:#4285f4;}.searchhead .slogo span:nth-child(2){color:#ea4335;}.searchhead .slogo span:nth-child(3){color:#fbbc05;}.searchhead .slogo span:nth-child(4){color:#34a853;}.searchhead .slogo span:nth-child(5){color:#ea4335;}.searchhead .slogo span:nth-child(6){color:#4285f4;}
.searchhead .sbox{flex:1; border:1.5px solid #999; border-radius:999px; padding:6px 14px; font-size:13px; color:#333; background:#fff;}
.sresult{padding:14px; border-bottom:1px solid var(--line);}
.sresult .rs{display:flex; align-items:center; gap:8px; font-size:12px; color:#333;}
.sresult .rs .rico{width:26px; height:26px; border-radius:50%; background:#f1f5f9; display:flex; align-items:center; justify-content:center; font-size:14px;}
.sresult .rurl{color:#5f6368; font-size:11px;}
.sresult .rt{font-size:15px; font-weight:700; margin-top:4px; line-height:1.6;}
.sresult .rt.plink{display:block;}
.sresult .rsn{font-size:12.5px; color:#4b5563; margin-top:3px; line-height:1.7;}
/* ---------- bulbs ---------- */
.bslot{display:inline-block; width:26px; height:34px; vertical-align:middle; position:relative;}
.bslot svg{width:100%; height:100%; display:block;}
.bslot.clickable{cursor:pointer;}
.bslot.hidden-b{visibility:hidden;}
.bslot.pop{animation:bpop .5s ease;}
@keyframes bpop{0%{transform:scale(0);}70%{transform:scale(1.4);}100%{transform:scale(1);}}
.bezel .bslot{width:30px; height:40px;}
.photo .bslot.overlay{position:absolute; top:8px; right:8px; width:30px; height:40px;}
.bulb-legend{display:flex; gap:2px;}
.bulb-legend .bslot{width:20px; height:27px;}
/* ---------- context menu ---------- */
#ctxmenu{position:fixed; z-index:200; background:#e5e7eb; border:1px solid #9ca3af; box-shadow:0 4px 14px rgba(0,0,0,.3); border-radius:4px; display:none; min-width:220px;}
#ctxmenu button{display:block; width:100%; text-align:left; background:none; border:none; padding:10px 14px; font-size:13.5px; font-weight:700; cursor:pointer;}
#ctxmenu button:first-child{border-bottom:1.5px solid #6b7280;}
#ctxmenu button:hover{background:#d1d5db;}
/* ---------- quiz panel ---------- */
.qpanel{flex:0 1 480px; position:sticky; top:70px; max-height:calc(100vh - 90px); overflow-y:auto; border:3px solid #e8895b; border-radius:20px; background:#fff; padding:18px; display:none;}
.qpanel.show{display:block;}
.qpanel .qhead{text-align:center; font-size:17px; font-weight:800; text-decoration:underline; margin-bottom:6px;}
.qpanel .talk{background:#eef2ff; border-radius:10px; padding:8px 12px; font-size:12px; font-weight:700; color:#4338ca; margin-bottom:10px; line-height:1.7;}
.qpanel .qq{display:flex; gap:8px; font-size:15px; font-weight:800; line-height:1.9; margin-bottom:14px;}
.qpanel .qq .fing{flex-shrink:0;}
.ynrow{display:flex; gap:10px; justify-content:center; flex-wrap:wrap;}
.ynrow button{background:#6b7280; color:#fff; border:none; border-radius:8px; padding:10px 22px; font-size:15px; font-weight:800; cursor:pointer;}
.ynrow button:hover{background:#4b5563;}
.fbbox{border:2.5px solid #e8895b; border-radius:16px; padding:14px; margin-top:14px;}
.fbbox .fbtitle{text-align:center; font-weight:800; font-size:16px; text-decoration:underline; margin-bottom:8px;}
.fbbox .fbtitle.good{color:#059669;}
.fbbox .fbtitle.bad{color:#dc2626;}
.fbbox .kh{text-align:center; font-weight:800; font-size:15px; margin:6px 0;}
.fbbox .ktext{font-size:14px; line-height:2; margin-bottom:10px; white-space:pre-line;}
.fbbox img{width:100%; border-radius:10px; display:block; margin-top:10px;}
.chalbtn{display:block; margin:14px auto 0; background:linear-gradient(90deg,#f59e0b,#f97316); color:#fff; border:none; border-radius:999px; padding:11px 26px; font-size:15px; font-weight:800; cursor:pointer;}
.chalbox{margin-top:14px;}
.chalbox .chq{font-size:14.5px; font-weight:800; line-height:1.9; margin-bottom:10px; display:flex; gap:8px;}
.chalbox .cc{display:block; width:100%; text-align:left; background:#fff; border:2.5px solid #111; border-radius:10px; padding:10px 14px; font-size:14px; font-weight:700; margin-bottom:8px; cursor:pointer; line-height:1.6;}
.chalbox .cc.sel-wrong{background:#9ca3af; color:#fff; border-color:#9ca3af;}
.chalbox .cc.sel-right{background:#d1fae5; border-color:#059669;}
.chalbox .cjudge{text-align:center; font-size:16px; font-weight:800; margin:10px 0;}
.closebtn{display:block; margin:14px auto 0; background:#374151; color:#fff; border:none; border-radius:10px; padding:10px 30px; font-size:14px; font-weight:800; cursor:pointer;}
/* panel overlay on narrow screens */
@media (max-width:919px){
  .stagewrap{flex-direction:column; align-items:stretch;}
  .phonecol{flex:1 1 auto; max-width:480px; margin:0 auto; width:100%;}
  .qpanel{position:fixed; left:50%; transform:translateX(-50%); bottom:0; top:auto; width:100%; max-width:520px;
    max-height:72vh; border-radius:20px 20px 0 0; z-index:120; box-shadow:0 -8px 30px rgba(0,0,0,.35);}
}
/* ---------- zukan ---------- */
.zsec{margin-bottom:18px;}
.zsec .zhead{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:10px;}
.zsec .zhead .zt{font-size:17px; font-weight:800;}
.zsec .zhead .zscore{margin-left:auto; background:#f1f5f9; border-radius:999px; padding:5px 14px; font-weight:800; font-size:13px;}
.zgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px;}
.zcard{background:#fff; border-radius:14px; padding:12px; cursor:pointer; box-shadow:0 2px 8px rgba(79,70,229,.08); display:flex; align-items:center; gap:10px;}
.zcard .zn{font-size:13px; font-weight:800; line-height:1.5;}
.zcard .zs{font-size:11px; color:var(--sub); margin-top:2px;}
/* ---------- modal / toast ---------- */
#modal-root{position:fixed; inset:0; display:none; z-index:300;}
#modal-root.show{display:flex; align-items:center; justify-content:center;}
.mback{position:absolute; inset:0; background:rgba(15,23,42,.66);}
.mbox{position:relative; background:#fff; border-radius:18px; width:92%; max-width:480px; max-height:88vh; overflow-y:auto; padding:20px; z-index:2;}
.mbox img{width:100%; border-radius:10px; display:block; margin-top:10px;}
.mclose{position:sticky; top:0; float:right; background:#1f2937; color:#fff; border:none; border-radius:999px; width:34px; height:34px; font-size:15px; cursor:pointer; z-index:3;}
#toast{position:fixed; left:50%; transform:translateX(-50%); bottom:30px; background:#1f2937; color:#fff; border-radius:999px; padding:11px 22px; font-size:13.5px; font-weight:700; z-index:400; opacity:0; transition:opacity .3s; pointer-events:none; max-width:90%; text-align:center;}
#toast.show{opacity:1;}
table.logt{width:100%; border-collapse:collapse; font-size:12.5px;}
table.logt th, table.logt td{border-bottom:1px solid var(--line); padding:7px 4px; text-align:left;}
table.logt th{color:var(--sub); font-weight:700; font-size:11.5px;}
input[type=text]{border:2px solid var(--line); border-radius:10px; padding:10px; font-size:15px; width:100%;}
.qprog{display:flex; gap:5px; margin-bottom:14px;}
.qprog i{flex:1; height:6px; border-radius:3px; background:#e0e7ff;}
.qprog i.done{background:var(--accent);}
.choice4{display:block; width:100%; text-align:left; background:#fff; border:2px solid var(--line); border-radius:12px; padding:12px 14px; font-size:14px; font-weight:700; margin-bottom:8px; cursor:pointer; line-height:1.6;}
.choice4.correct{border-color:#059669; background:#ecfdf5;}
.choice4.wrong{border-color:#dc2626; background:#fef2f2;}
/* ---------- 研究用モード ---------- */
.sidform{margin-top:14px;}
.sidrow{display:flex; gap:10px; margin-bottom:10px;}
.sidfield{flex:1;}
.sidfield label{display:block; font-size:12px; font-weight:800; color:var(--accent); margin-bottom:4px;}
.sidfield select, .sidfield input{
  width:100%; border:2px solid var(--line); border-radius:10px; padding:10px;
  font-size:16px; font-family:inherit; background:#fff; color:var(--ink);
}
.sidfield select:focus, .sidfield input:focus{border-color:var(--accent); outline:none;}
.sidnote{background:#eef2ff; border-radius:10px; padding:10px 12px; font-size:12px; line-height:1.8; color:#4338ca; font-weight:700;}
.siderr{color:#dc2626; font-size:13px; font-weight:800; margin-top:8px; min-height:19px;}
.studychip{background:#fef3c7; color:#92400e; border-radius:999px; padding:4px 12px; font-size:12px; font-weight:800; display:inline-block;}
#modal-root.locked .mback{cursor:default;}
</style>
</head>
<body>
<header id="hdr">
  <span class="logo">🕵️</span>
  <div class="ttl">科学メディアリテラシー探偵団</div>
  <div class="score" id="scorebox">⭐ 0点</div>
  <nav>
    <button id="nav-home" onclick="go('home')">🏠 ホーム</button>
    <button id="nav-zukan" onclick="go('zukan')">📖 図鑑</button>
    <button id="nav-log" onclick="go('log')">📊 きろく</button>
  </nav>
</header>
<main id="main"></main>
<div id="ctxmenu"></div>
<div id="modal-root"></div>
<div id="toast"></div>

<script>
/* =====================================================================
   科学メディアリテラシー探偵団
   （縦読み・横読み × 電球チェックポイント × 漫画 × クイズ）
   元資料：アプリイメージ.pptx ／ 各教材に埋め込まれた信頼性評価規準.xlsx ／ pic フォルダ
   ===================================================================== */
const PREPOST_ENABLED = false;     /* ←プレポストテストの有無（true=あり／false=なし） */
const PIC = "pic/";

/* =====================================================================
   研究用モード（URLに ?study=A / B / C が付いたときだけ有効）
   A＝通常版ペア（出席番号2名）／B＝通常版個別／C＝ゲーム版個別
   パラメータが無い場合は一般公開版として動作し、送信は一切行わない。
   ===================================================================== */
const APP_EDITION = "通常版";
/* ▼▼ 先生用：Google Apps ScriptのウェブアプリURLをここに貼り付けてください ▼▼ */
const GAS_URL = "https://script.google.com/macros/s/AKfycbzIuj4XH5w2P8BLkMAQHDfvxOMYiYRItUa6jhOCTc40nVvjoLb6fm8xFfqqzx6NbiOixg/exec";
/* ▲▲ 例: https://script.google.com/macros/s/AKfyc.../exec ▲▲ */
const STUDY_GROUPS = {
  A:{name:"A群（通常版・ペア学習）", pair:true},
  B:{name:"B群（通常版・個別学習）", pair:false},
  C:{name:"C群（ゲーム版・個別学習）", pair:false}
};
const STUDY = (new URLSearchParams(location.search).get("study") || "").trim().toUpperCase();
const STUDY_ON = Object.prototype.hasOwnProperty.call(STUDY_GROUPS, STUDY);
const PAIR_ID = STUDY_ON && STUDY_GROUPS[STUDY].pair;


/* ---------------- 分類（電球の色） ---------------- */
const CATS = {
  what:{label:"What", color:"#ef4444", light:"#fca5a5", q:"研究の内容は確かかな？", desc:"研究内容をチェック"},
  who: {label:"Who",  color:"#34d399", light:"#a7f3d0", q:"信頼できる科学者かな？", desc:"どの科学者が信頼できるかチェック"},
  how: {label:"How",  color:"#fbbf24", light:"#fde68a", q:"どうやって伝わるのかな？", desc:"ネットの特徴的な表現と人の受け止め方をチェック"}
};

/* ---------------- チェックポイント（20） ---------------- */
const CRITERIA = {
  kakusan:{cat:"how", name:"拡散希望", manga:["kakusan.png"],
    statement:"「拡散希望」の表示があれば、どんな投稿でも投稿者のために拡散すべきである。", answer:false,
    expl:"「拡散希望」は過度に拡散をあおる（感情に訴える）行為です。よかれと思って、拡散しないようにしましょう。",
    challenge:{q:"「拡散希望」の投稿を見たとき、どうすべきですか？",
      choices:["友だちにだけ送る","良い内容なら拡散する","感動したら拡散する","よかれと思っても拡散しない"], correct:3}},
  kocho:{cat:"how", name:"タイトルの誇張", manga:["kocho.png"],
    statement:"本文の内容に比べ、タイトルは大げさな（誇張）表現である。", answer:true,

    challenge:{q:"SNSや動画サイトなどで、コンテンツのタイトルが大げさに書かれていることがあります。その理由として、もっとも考えられるのはどれですか。",

const LS_KEY = "sml_tanteidan_v2";
let S = loadState();

function defaultState(){
  const st = {version:2, app:"科学メディアリテラシー探偵団", name:"",
    createdAt:new Date().toISOString(), updatedAt:null,
    crit:{}, practice:{tate:false, yoko:false},
    retryShown:false, perfectPraised:false,
    tests:{pre:null, post:null}, events:[],
    sid:null, sessionId:null, sentCount:0, lastSentAt:null};
  Object.keys(CRITERIA).forEach(k=>{ st.crit[k] = {quiz:null, challenge:null, quizFirst:null, chalFirst:null, quizTry:0, chalTry:0}; });
  return st;
}
function loadState(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){ const st = JSON.parse(raw); if(st && st.version===2) return mergeState(st); }
  }catch(e){}
  return defaultState();
}
function mergeState(st){
  const d = defaultState();
  Object.keys(CRITERIA).forEach(k=>{ if(!st.crit[k]) st.crit[k]=d.crit[k]; });
  Object.values(st.crit).forEach(c=>{ if(!("quizFirst" in c)) c.quizFirst = c.quiz; if(!("chalFirst" in c)) c.chalFirst = c.challenge; });
  if(st.retryShown===undefined) st.retryShown = false;
  if(st.perfectPraised===undefined) st.perfectPraised = false;
  if(!st.practice) st.practice = d.practice;
  if(!st.tests) st.tests = {pre:null, post:null};
  if(!Array.isArray(st.events)) st.events = [];
  if(st.sid===undefined) st.sid = null;
  if(!st.sessionId) st.sessionId = null;
  if(typeof st.sentCount !== "number") st.sentCount = 0;
  if(st.lastSentAt===undefined) st.lastSentAt = null;
  return st;
}
function save(){
  S.updatedAt = new Date().toISOString();
  try{ localStorage.setItem(LS_KEY, JSON.stringify(S)); }catch(e){}
}
function logEv(type, data){
  S.events.push(Object.assign({t:new Date().toISOString(), type}, data||{}));
  if(S.events.length>6000) S.events = S.events.slice(-6000);
  save();
}
function bulbState(critId){
  const c = S.crit[critId];
  const n = (c.quiz===true?1:0) + (c.challenge===true?1:0);
  return n===2 ? "off" : n===1 ? "half" : "lit";
}

function allBulbsDone(){

function catScore(catId){
  let ok=0, all=0;
  Object.entries(CRITERIA).forEach(([id,c])=>{
    if(c.cat!==catId) return;
    all+=5;
    if(S.crit[id].quiz===true) ok+=2;
    if(S.crit[id].challenge===true) ok+=3;
  });
  return {ok, all};
}

/* ---------------- 本編ステージ ---------------- */
function newsById(id){ return NEWS.find(n=>n.id===id); }

/* 学習ランク：gold=パーフェクト／silver=全問回答＋得点あり／bronze=全問回答（得点なし）／null=未完了 */
function stageRank(n){
  const done = n.bulbs.every(cid=>S.crit[cid].quiz!==null && S.crit[cid].challenge!==null);
  if(!done) return null;
  if(n.bulbs.every(cid=>bulbState(cid)==="off")) return "gold";
  let ok=0; n.bulbs.forEach(cid=>{ if(S.crit[cid].quiz===true)ok++; if(S.crit[cid].challenge===true)ok++; });
  return ok>0 ? "silver" : "bronze";
}

function startNews(id){
  const n = newsById(id);
  if(n.mode==="yoko" && !yokoUnlocked()){ toast(YOKO_LOCK_MSG); return; }
  stg = Object.assign(baseStageState(), {kind:"news", id});
  stg.tabs = [{id:"post", label:n.tab}];
  logEv("stage_open",{stage:id});
  screenName="stage"; setNav("");
  renderStage();
}
function renderStage(){
  const n = newsById(stg.id);
  const tabsHtml = stg.tabs.map((t,i)=>`<button class="ptab ${i===stg.active?"on":""}" data-tab="${i}">${t.label}</button>`).join("");
  const t = stg.tabs[stg.active];
  let content = "";
  if(t.id==="post") content = n.feed();
  else content = n.sources.find(s=>s.id===t.id).page();
  const banner = n.mode==="tate"
    ? `⬇️ <b>縦読み</b>：「・・・更に表示」を開いて、<b>一番下まで</b>スクロールすると電球が現れるよ。`
    : `➡️ <b>横読み</b>：<span style="color:var(--purple);">ムラサキの文字</span>をクリックして、<b>すべてのタブ</b>を開くと電球が現れるよ。`;
  $main.innerHTML = `
  <div class="stagewrap">
    <div class="phonecol">
      <button class="btn ghost" onclick="go('news')" style="margin-bottom:10px;">◀ ニュース選択に戻る</button>
      <div class="banner">${n.icon} <b>${esc(n.title)}</b> ─ ${banner}</div>
      <div class="phone">
        <div class="bezel" id="bezel">${n.bulbs.map(cid=>`<span class="bslot stage-b" data-crit="${cid}" data-bezel="1"></span>`).join("")}</div>
        <div class="pbody">
          <div class="ptabs">${tabsHtml}</div>
          <div class="pscreen" id="pscreen">${content}</div>
        </div>
      </div>
    </div>
    <div class="qpanel" id="qpanel"></div>
  </div>`;
  bindStageEvents("news");
  updateStageBulbs();
  if(stg.quiz) renderQuizPanel();
}
/* 展開状態を保ったまま再描画したあと復元 */
function restoreExpanded(){
  Object.keys(stg.expanded).forEach(x=>{
    const link = document.querySelector(`.morelink[data-x="${x}"]`);
    if(link){ link.style.display="none";
      const mt = link.parentElement.querySelector(".moretext");
      if(mt) mt.style.display="inline"; }
  });
}

/* ---------------- ステージ共通イベント ---------------- */
function bindStageEvents(mode){
  const ps = document.getElementById("pscreen");
  if(!ps) return;
  restoreExpanded();
  ps.addEventListener("click", (e)=>{
    const more = e.target.closest(".morelink");
    if(more){
      stg.expanded[more.dataset.x] = true;
      more.style.display = "none";
      const mt = more.parentElement.querySelector(".moretext");
      if(mt) mt.style.display = "inline";
      logEv("expand_more",{stage:stg.id||stg.kind, key:more.dataset.x});
      stg.maxScroll = 0;   /* 展開で本文が伸びるため、スクロール達成度を測り直す */
      checkTate();
      return;
    }
    const pl = e.target.closest(".plink");
    if(pl){ onPurpleClick(pl, mode); return; }
    const pb = e.target.closest(".bslot.practice-b");
    if(pb && !pb.classList.contains("hidden-b") && pb.dataset.bezel!=="1"){ openPracticeNote(pb.dataset.pr); return; }
    const sb = e.target.closest(".bslot.stage-b");
    if(sb && !sb.classList.contains("hidden-b") && sb.dataset.bezel!=="1"){ openQuiz(sb.dataset.crit); return; }
  });
  ps.addEventListener("scroll", ()=>{ checkTate(); });
  // タブ切り替え
  document.querySelectorAll(".ptab").forEach(el=>{
    el.addEventListener("click", ()=>{
      const i = Number(el.dataset.tab);
      if(Number.isNaN(i)) return;
      stg.active = i;
      if(stg.kind==="p_yoko") renderPracticeYoko(); else renderStage();
    });
  });
  checkTate();
}
function checkTate(){
  if(!stg) return;
  const kind = stg.kind;
  const isTateStage = (kind==="p_tate") || (kind==="news" && newsById(stg.id).mode==="tate");
  if(!isTateStage || stg.unlocked) return;
  const need = (kind==="p_tate") ? PRACTICE_TATE.needExpand : newsById(stg.id).needExpand;
  const ps = document.getElementById("pscreen");
  if(!ps) return;
  const max = ps.scrollHeight - ps.clientHeight;
  const p = max<=10 ? 1 : ps.scrollTop/max;
  if(p > stg.maxScroll) stg.maxScroll = p;
  if(Object.keys(stg.expanded).length >= need && stg.maxScroll >= 0.98){
    stg.unlocked = true;
    logEv("tate_complete",{stage:stg.id||stg.kind});
    if(kind==="p_tate") updatePracticeBulbs(); else updateStageBulbs(true);
    toast("💡 電球が現れた！クリックしてクイズに挑戦しよう");
  }
}
function onPurpleClick(el, mode){
  const target = el.dataset.open;
  if(mode==="practice-yoko"){
    if(target==="search"){ showCtx(el, ()=>practiceYokoOpen("search")); }
    else { practiceYokoOpen(target); }
    return;
  }
  // 本編：確認メニュー → 指定タブを開く
  showCtx(el, ()=>{
    const ids = target.split(",");
    const n = newsById(stg.id);
    ids.forEach(srcId=>{
      const src = n.sources.find(s=>s.id===srcId);
      if(!src) return;
      if(!stg.tabs.find(t=>t.id===srcId)) stg.tabs.push({id:srcId, label:src.tab});
      stg.opened[srcId] = true;
      logEv("tab_open",{stage:stg.id, source:srcId});
    });
    stg.active = stg.tabs.findIndex(t=>t.id===ids[0]);
    const allOpen = n.sources.every(s=>stg.opened[s.id]);
    if(allOpen && !stg.unlocked){
      stg.unlocked = true;
      logEv("yoko_complete",{stage:stg.id});
      setTimeout(()=>toast("💡 すべてのタブを開いた！電球が現れた！"), 350);
    }
    renderStage();
  });
}
/* コンテキストメニュー */
function showCtx(el, onOpen){
  const m = document.getElementById("ctxmenu");
  m.innerHTML = `<button id="ctx-open">新しいタブを開いて検索</button><button id="ctx-cancel">やめる</button>`;
  const r = el.getBoundingClientRect();
  m.style.display = "block";
  m.style.left = Math.min(r.left, window.innerWidth-250) + "px";
  m.style.top = (r.bottom + 4) + "px";
  document.getElementById("ctx-open").onclick = ()=>{ hideCtx(); onOpen(); };
  document.getElementById("ctx-cancel").onclick = ()=>{ hideCtx(); logEv("ctx_cancel"); };
  setTimeout(()=>{
    document.addEventListener("click", ctxOutside, {once:true});
  },0);
}
function ctxOutside(e){ if(!e.target.closest("#ctxmenu")) hideCtx(); }
function hideCtx(){ const m=document.getElementById("ctxmenu"); if(m) m.style.display="none"; }

/* 電球の表示更新 */
function updateStageBulbs(pop){
  if(!stg || stg.kind!=="news") return;
  const n = newsById(stg.id);
  document.querySelectorAll(".bslot.stage-b").forEach(el=>{
    const cid = el.dataset.crit;
    el.innerHTML = bulbSVG(CRITERIA[cid].cat, bulbState(cid));
    if(el.dataset.bezel==="1") return;
    const show = stg.unlocked;
    el.classList.toggle("hidden-b", !show);
    if(show){ el.classList.add("clickable"); if(pop) el.classList.add("pop"); }
  });
}

function openQuiz(critId){
  const c = S.crit[critId];
  let step;
  if(c.quiz===null) step = "quiz";
  else if(c.challenge===null) step = "chal-direct";
  else if(!allBulbsDone()) step = "locked";
  else if(c.quiz===true && c.challenge===true) step = "done";
  else if(c.quiz===true) step = "chal-direct";
  else step = "quiz";
  stg.quiz = {crit:critId, step, quizAnswer:null, chalAnswer:null};
  logEv("bulb_click",{stage:stg.id, crit:critId, state:bulbState(critId)});
  renderQuizPanel();
  const qp = document.getElementById("qpanel");
  if(qp) qp.scrollTop = 0;
}
function renderQuizPanel(){
  const qp = document.getElementById("qpanel");
  if(!qp || !stg.quiz) return;
  const q = stg.quiz;
  const cr = CRITERIA[q.crit];
  let html = "";

  if(q.step==="quiz"){
    html = `<div class="qhead">クイズ</div>
      <div class="qq"><span class="fing">👉</span><span>${esc(cr.statement)}</span></div>
      <div class="ynrow">
        <button onclick="answerQuiz(true)">はい</button>
        <button onclick="answerQuiz(false)">いいえ</button>
      </div>`;
  }
  else if(q.step==="fb"){
    const correct = q.quizAnswer===cr.answer;
    const title = correct ? `<div class="fbtitle good">正解！解説を確認しよう。</div>`
      : `<div class="fbtitle bad">残念！解説を確認しよう。</div>`;
    html = `<div class="qhead">クイズ</div>
      <div class="qq"><span class="fing">👉</span><span>${esc(cr.statement)}<br><span style="font-size:12.5px; color:var(--sub);">正解は「<b>${cr.answer?"はい":"いいえ"}</b>」</span></span></div>
      <div class="fbbox">${title}
        <div class="kh">＜解説＞</div>
        <div class="ktext">${nl(cr.expl)}</div>
        ${mangaHTML(cr)}
      </div>
      ${S.crit[q.crit].challenge===true
        ? `<button class="closebtn" onclick="closeQuiz()">閉じる</button>`
        : `<button class="chalbtn" onclick="toChallenge()">チャレンジ問題！</button>`}`;
  }
  else if(q.step==="chal-direct"){
    html = `<div class="qhead">再チャレンジ</div>
      <div class="qq"><span class="fing">👉</span><span>${esc(cr.statement)}<br><span style="font-size:12.5px; color:var(--sub);">クイズは${S.crit[q.crit].quiz===true?"正解":"回答"}ずみ（正解は「${cr.answer?"はい":"いいえ"}」）。チャレンジ問題に${S.crit[q.crit].chalTry>0?"再挑戦":"挑戦"}しよう！</span></span></div>
      <button class="chalbtn" onclick="toChallenge()">チャレンジ問題！</button>
      <button class="closebtn" onclick="closeQuiz()">閉じる</button>`;
  }
  else if(q.step==="chal"){
    html = `<div class="qhead">チャレンジ問題</div>
      <div class="chalbox">
        <div class="chq"><span>👉</span><span>${esc(cr.challenge.q)}</span></div>
        ${cr.challenge.choices.map((cc,i)=>`<button class="cc" onclick="answerChallenge(${i})">${i+1}. ${esc(cc)}</button>`).join("")}
      </div>`;
  }
  else if(q.step==="chal-fb"){
    const ok = q.chalAnswer===cr.challenge.correct;
    html = `<div class="qhead">チャレンジ問題</div>
      <div class="chalbox">
        <div class="chq"><span>👉</span><span>${esc(cr.challenge.q)}</span></div>
        ${cr.challenge.choices.map((cc,i)=>{
          let cls = "";
          if(i===cr.challenge.correct) cls = "sel-right";
          else if(i===q.chalAnswer) cls = "sel-wrong";
          return `<button class="cc ${cls}">${i+1}. ${esc(cc)}</button>`;}).join("")}
        <div class="cjudge">${ok?"🎉 正解！　+3点":"😢 残念！　正解は「"+(cr.challenge.correct+1)+"」"}</div>
        <button class="closebtn" onclick="closeQuiz()">閉じる</button>
      </div>`;
  }
  else if(q.step==="locked"){
    const st = S.crit[q.crit];
    const mk = v => v===true?"⭕":"❌";
    html = `<div class="qhead">回答ずみ</div>
      <div class="qq"><span class="fing">👉</span><span>${esc(cr.statement)}<br><span style="font-size:12.5px; color:var(--sub);">クイズ ${mk(st.quiz)}　チャレンジ問題 ${mk(st.challenge)}（正解は「${cr.answer?"はい":"いいえ"}」）</span></span></div>
      <div class="fbbox"><div class="kh">＜解説＞</div>
        <div class="ktext">${nl(cr.expl)}</div>
        ${mangaHTML(cr)}
      </div>
      <div style="background:#eef2ff; border-radius:12px; padding:10px 14px; margin-top:12px; font-size:13px; font-weight:800; color:#4338ca; line-height:1.8;">🔒 まちがえた問題への再チャレンジは、6つの教材をすべて終えると解放されるよ！</div>
      <button class="closebtn" onclick="closeQuiz()">閉じる</button>`;
  }
  else if(q.step==="done"){
    html = `<div class="qhead">クリア済み ✅</div>
      <div class="qq"><span class="fing">👉</span><span>${esc(cr.statement)}<br><span style="font-size:12.5px; color:var(--sub);">この電球は2問とも正解して消灯済み！解説と漫画を復習できるよ。</span></span></div>

        <div class="ktext">${nl(cr.expl)}</div>
        ${mangaHTML(cr)}
      </div>
      <button class="closebtn" onclick="closeQuiz()">閉じる</button>`;
  }
  qp.innerHTML = html;
  qp.classList.add("show");
}
/* 漫画（複数枚のときは間にテキストを挟める） */
function mangaHTML(cr){
  let h = "";
  cr.manga.forEach((m,i)=>{
    if(i===1 && cr.between) h += `<div style="background:#eef2ff; border-radius:10px; padding:10px 14px; margin-top:12px; font-size:14px; font-weight:700; line-height:1.9;">${esc(cr.between)}</div>`;
    h += `<img src="${PIC}${m}" alt="解説漫画" loading="lazy">`;
  });
  return h;
}
function answerQuiz(ans){
  const q = stg.quiz, cr = CRITERIA[q.crit], st = S.crit[q.crit];
  const correct = ans===cr.answer;
  q.quizAnswer = ans;
  st.quizTry++;
  st.quiz = correct;
  if(st.quizTry===1) st.quizFirst = correct;
  else if(correct) retryGain();
  save();
  logEv("quiz_answer",{stage:stg.id, crit:q.crit, choice:ans?"yes":"no", correct, try:st.quizTry});
  q.step = "fb";
  renderQuizPanel(); renderScore(); updateStageBulbs();
  document.getElementById("qpanel").scrollTop = 0;
}
function toChallenge(){
  stg.quiz.step = "chal";
  renderQuizPanel();
  document.getElementById("qpanel").scrollTop = 0;
}
function answerChallenge(i){
  const q = stg.quiz, cr = CRITERIA[q.crit], st = S.crit[q.crit];
  const correct = i===cr.challenge.correct;
  q.chalAnswer = i;
  st.chalTry++;
  st.challenge = correct;
  if(st.chalTry===1) st.chalFirst = correct;
  else if(correct) retryGain();
  save();
  logEv("challenge_answer",{stage:stg.id, crit:q.crit, choice:i+1, correct, try:st.chalTry});
  q.step = "chal-fb";
  renderQuizPanel(); renderScore(); updateStageBulbs();
}
function closeQuiz(){
  stg.quiz = null;
  const qp = document.getElementById("qpanel");
  qp.classList.remove("show");
  updateStageBulbs();
  const gDone = allBulbsDone();
  if(gDone && Object.keys(CRITERIA).every(id=>bulbState(id)==="off") && !S.perfectPraised){
    S.perfectPraised = true; S.retryShown = true; save();
    grandPraiseModal();
    return;
  }
  if(gDone && !S.retryShown){
    S.retryShown = true; save();
    retryUnlockModal();
    return;
  }
  const n = stg.kind==="news" ? newsById(stg.id) : null;
  if(n){
    const allOff = n.bulbs.every(cid=>bulbState(cid)==="off");
    if(allOff && !stg.congrats){
      stg.congrats = true;
      logEv("stage_all_off",{stage:stg.id});
      openModal(`<div style="font-size:48px; text-align:center;">🎉💡🎉</div>
        <div class="h1" style="text-align:center;">「${esc(n.title)}」の電球を全部消した！</div>
        <p class="small" style="text-align:center; margin-top:8px;">パーフェクト！次のニュースも調査しよう。</p>
        <button class="btn wide pink" style="margin-top:12px;" onclick="closeModal();go('news')">ニュース選択に戻る</button>
        <button class="btn ghost wide" style="margin-top:8px;" onclick="closeModal()">この記事をもう一度見る</button>`);
    }
    else if(!allOff && !stg.encouraged && n.bulbs.every(cid=>S.crit[cid].quiz!==null && S.crit[cid].challenge!==null)){
      stg.encouraged = true;
      const remain = n.bulbs.filter(cid=>bulbState(cid)!=="off").length;
      logEv("stage_encourage",{stage:stg.id, remain});
      if(allBulbsDone()){
        openModal(`<div style="font-size:48px; text-align:center;">🔁💪</div>
          <div class="h1" style="text-align:center;">おしい！あと${remain}個の電球が残っているよ</div>
          <p style="font-size:14px; line-height:2; text-align:center; margin-top:10px;"><b style="color:var(--accent2);">再チャレンジして満点を目指そう！</b><br>半灯・点灯の電球をもう一度クリックすると、まちがえた問題に再挑戦できるよ。<br><span style="font-size:12.5px; color:var(--sub);">初回 ${firstScore()}点 → 現在 ${totalScore()}点</span></p>
          <button class="btn wide pink" style="margin-top:12px;" onclick="closeModal()">🔁 再チャレンジする！</button>
          <button class="btn ghost wide" style="margin-top:8px;" onclick="closeModal();go('news')">ニュース選択に戻る</button>`);
      } else {
        openModal(`<div style="font-size:48px; text-align:center;">📋✅</div>
          <div class="h1" style="text-align:center;">この${'教材'}の電球ぜんぶに答えた！</div>
          <p style="font-size:14px; line-height:2; text-align:center; margin-top:10px;">のこりの${'教材'}も調査しよう。<br><b>6つすべてを終えると、まちがえた問題への「再チャレンジ」が解放されるよ！</b></p>
          <button class="btn wide pink" style="margin-top:12px;" onclick="closeModal();go('news')">つぎへ進む！</button>
          <button class="btn ghost wide" style="margin-top:8px;" onclick="closeModal()">この記事をもう一度見る</button>`);
      }
    }
  }
}

 {crit:"senmon", q:"「宇宙ロケットの開発」で有名な工学博士が、サプリメントの健康効果について解説しています。この状況にはどのようなリスクがあると考えられますか？",
  choices:["ロケットを作れるほど頭が良いので、リスクは全くない","「博士」という肩書きがあることで、専門外の内容でも正しく聞こえてしまう（錯覚してしまう）リスク","ロケットの技術がサプリメントに応用されているはずなので、特に気にする必要はない","難しい話を分かりやすくしてくれるので、専門性は関係ないと考えるリスク"], correct:1},
 {crit:"coi", q:"ある会社から研究費をもらって行われた研究の結果を見るとき、特に注意すべきことは何ですか？",
  choices:["お金をもらって研究をすることは禁止されているので、その情報はすべて嘘である","研究費を出した会社にとって「都合の良い結果」が出るように、データの解釈が偏っている可能性がある","たくさんのお金をもらっている研究ほど、科学的に100%正しいことが保証されている","お金を出した会社の名前が有名であれば、内容は疑わなくて良い"], correct:1}
];
function startTest(kind){
  if(!PREPOST_ENABLED) return;
  if(S.tests[kind]){
    toast(kind==="pre" ? "事前テストは実施済みです（" + S.tests.pre.score + "/" + S.tests.pre.total + "）" : "事後テストは実施済みです");
    if(S.tests.pre && S.tests.post) showTestCompare();
    return;
  }
  if(kind==="post" && !allBulbsDone()){
    toast("🔒 6つの教材の電球すべてに答えると、事後テストが受けられるよ（あと" + remainingBulbQuestions() + "問）");
    return;
  }
  testRun = {kind, idx:0, answers:[], score:0};
  logEv("test_start",{kind});
  screenName="test"; setNav("");
  renderTest();
}
function renderTest(){
  const q = PREPOST[testRun.idx];
  const prog = PREPOST.map((_,k)=>`<i class="${k<testRun.idx?"done":""}"></i>`).join("");
  $main.innerHTML = `
  <div class="card" style="max-width:640px; margin:0 auto 16px;">
    <div class="h2">📝 たしかめテスト（${testRun.kind==="pre"?"事前":"事後"}）　問${testRun.idx+1}／${PREPOST.length}</div>
    <div class="qprog">${prog}</div>
    <p style="font-size:15px; font-weight:800; line-height:1.9; margin-bottom:14px;">${esc(q.q)}</p>
    ${q.choices.map((c,i)=>`<button class="choice4" onclick="answerTest(${i})">${i+1}. ${esc(c)}</button>`).join("")}
  </div>`;
  window.scrollTo(0,0);
}
function answerTest(i){
  const q = PREPOST[testRun.idx];
  const correct = i===q.correct;
  if(correct) testRun.score++;
  testRun.answers.push({crit:q.crit, choice:i, correct});
  logEv("test_answer",{kind:testRun.kind, no:testRun.idx+1, crit:q.crit, choice:i+1, correct});
  if(testRun.idx < PREPOST.length-1){ testRun.idx++; renderTest(); }
  else finishTest();
}
function finishTest(){
  const r = {score:testRun.score, total:PREPOST.length, at:new Date().toISOString(), answers:testRun.answers};
  S.tests[testRun.kind] = r; save();
  logEv("test_done",{kind:testRun.kind, score:r.score, total:r.total});
  let compare = "";
  if(S.tests.pre && S.tests.post){
    const diff = S.tests.post.score - S.tests.pre.score;
    compare = `<div class="card" style="text-align:center;">
      <div class="h2">📈 事前 → 事後</div>
      <div style="font-size:24px; font-weight:800;">${S.tests.pre.score}点 → ${S.tests.post.score}点
        <span style="color:${diff>=0?"#059669":"#dc2626"};">（${diff>=0?"+":""}${diff}）</span></div>
      <p class="small">${diff>0?"すごい！学習の成果が出ているよ🎉":diff===0?"同じ点数。図鑑で復習してみよう！":"むずかしかったね。図鑑と漫画で復習しよう！"}</p></div>`;
  }
  const kind = testRun.kind;
  testRun = null;
  $main.innerHTML = `
  <div style="max-width:640px; margin:0 auto;">
    <div class="card" style="text-align:center;">
      <div style="font-size:48px;">${"🌟"}</div>
      <div class="h1">${kind==="pre"?"事前":"事後"}テスト結果</div>
      <div style="font-size:38px; font-weight:800; color:var(--accent); margin:8px 0;">${S.tests[kind].score} <span style="font-size:16px; color:var(--sub);">／ ${PREPOST.length}問</span></div>
    </div>
    ${compare}
    ${kind==="pre" ? `<div class="card" style="text-align:center; background:#ecfdf5;">🔓 <b>①②③のメニューが使えるようになりました！</b><br><span class="small">まずは「①チェックの技を練習する！」から始めよう。</span></div>` : ""}
    <button class="btn wide pink" onclick="go('home')">🏠 ホームに戻る${kind==="pre"?"（学習をはじめる！）":""}</button>
  </div>`;
  window.scrollTo(0,0);
}

/* =====================================================================
   きろく（学習ログ）
   ===================================================================== */
function renderLog(){
  renderScore();
  const critRows = Object.entries(CRITERIA).map(([id,cr])=>{
    const st = S.crit[id];
    const mark = v => v===null?"─":(v?"⭕":"❌");
    return `<tr><td>${miniBulb(cr.cat, bulbState(id))} ${esc(cr.name)}</td><td>${CATS[cr.cat].label}</td><td>${mark(st.quiz)}</td><td>${mark(st.challenge)}</td><td>${st.quizTry+st.chalTry}回</td></tr>`;
  }).join("");
  const pre = S.tests.pre, post = S.tests.post;
  const w = catScore("what"), h = catScore("who"), o = catScore("how");
  $main.innerHTML = `
  <div class="card">
    <div class="h2">🕵️ 調査員：${S.name?esc(S.name):"（未設定）"} <a href="#" style="font-size:12px;" onclick="askName();return false;">変更</a></div>
    <div class="small">合計 <b style="color:#b45309;">⭐${totalScore()}点／100点</b>${allBulbsDone()?`　🔥 初回チャレンジ ${firstScore()}点 → 現在 ${totalScore()}点`:""}
      ─ What ${w.ok}/${w.all}点 ・ Who ${h.ok}/${h.all}点 ・ How ${o.ok}/${o.all}点<br>
      練習：縦読み${S.practice.tate?"✅":"─"} 横読み${S.practice.yoko?"✅":"─"} ／ 記録イベント数 ${S.events.length}件<br>
      はじめた日：${S.createdAt?S.createdAt.slice(0,10):"─"} ／ 最終更新：${S.updatedAt?S.updatedAt.slice(0,16).replace("T"," "):"─"}</div>
  </div>
  ${studyCardHTML()}
  <div class="card">
    <div class="h2">💾 学習ログの保存と引きつぎ</div>
    <p class="small" style="margin-bottom:10px;">「ダウンロード」でログファイル（JSON）を保存。次に使うときに「インポート」で読みこむと、続きから学習できます。</p>
    <button class="btn wide" onclick="exportLog()">📥 学習ログをダウンロード（JSON）</button>
    <button class="btn ghost wide" style="margin-top:8px;" onclick="document.getElementById('importFile').click()">📤 学習ログをインポート</button>
    <input type="file" id="importFile" accept=".json,application/json" style="display:none;" onchange="importLog(this)">
    <button class="btn ghost wide" style="margin-top:8px;" onclick="exportCsv()">🧾 回答データをCSVで出力（先生用）</button>
    <button class="btn wide" style="margin-top:8px; background:#fee2e2; color:#b91c1c;" onclick="confirmReset()">🗑️ きろくをリセット</button>
  </div>
  ${PREPOST_ENABLED?`
  <div class="card">
    <div class="h2">📝 たしかめテスト</div>
    <table class="logt"><tr><th></th><th>点数</th><th>実施日時</th></tr>
      <tr><td>事前</td><td>${pre?`${pre.score}/${pre.total}`:"未実施"}</td><td>${pre?pre.at.slice(0,16).replace("T"," "):"─"}</td></tr>
      <tr><td>事後</td><td>${post?`${post.score}/${post.total}`:"未実施"}</td><td>${post?post.at.slice(0,16).replace("T"," "):"─"}</td></tr>
    </table>
  </div>`:""}
  <div class="card">
    <div class="h2">💡 電球ごとの記録（⭕=正解 ❌=不正解 ─=未挑戦）</div>
    <table class="logt"><tr><th>チェックポイント</th><th>分類</th><th>クイズ</th><th>チャレンジ</th><th>挑戦</th></tr>${critRows}</table>
  </div>`;
}
function stamp(){
  const d = new Date();
  return d.getFullYear()+("0"+(d.getMonth()+1)).slice(-2)+("0"+d.getDate()).slice(-2)+"_"+("0"+d.getHours()).slice(-2)+("0"+d.getMinutes()).slice(-2);
}
function downloadFile(name, content, type){
  const blob = new Blob([content], {type});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = name;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 500);
}
function exportLog(){
  logEv("export");
  downloadFile(`SML学習ログ_${S.name||"名無し"}_${stamp()}.json`, JSON.stringify(S, null, 1), "application/json");
  toast("📥 ダウンロードしました！ファイルは大切に保管してね");
}
function exportCsv(){
  const rows = [["日時","種類","教材","チェックポイント","回答","正誤","その他"]];
  S.events.forEach(e=>{
    let extra = e.kind || e.source || e.name || (e.score!==undefined ? "score="+e.score : "") || (e.state||"") || (e.key||"");
    rows.push([e.t, e.type, e.stage||"", e.crit||"",
      e.choice!==undefined?String(e.choice):"", e.correct!==undefined?(e.correct?"正":"誤"):"", extra]);
  });
  const csv = "﻿"+rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\r\n");
  downloadFile(`SML回答データ_${S.name||"名無し"}_${stamp()}.csv`, csv, "text/csv");
  logEv("export_csv");
}
function importLog(input){
  const f = input.files && input.files[0];
  if(!f) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const st = JSON.parse(reader.result);
      if(!st || st.version!==2 || !st.crit) throw new Error("bad format");
      S = mergeState(st);
      S.events.push({t:new Date().toISOString(), type:"import"});
      save(); renderLog(); renderScore();
      toast("📤 学習ログを読みこみました！おかえりなさい" + (S.name?"、"+S.name+"さん":"") + "！");
    }catch(e){
      toast("⚠️ 読みこめませんでした。このアプリで保存したJSONファイルを選んでね");
    }
    input.value = "";
  };
  reader.readAsText(f);
}
function confirmReset(){
  openModal(`<div class="h2">🗑️ きろくをリセットする？</div>
    <p class="small" style="margin:10px 0;">得点・電球の状態・テスト結果・ログがすべて消えます。心配なら先に「📥ダウンロード」で保存しておこう。</p>
    <button class="btn wide" style="background:#ef4444;" onclick="doReset()">リセットする</button>
    <button class="btn ghost wide" style="margin-top:8px;" onclick="closeModal()">やめる</button>`);
}
function doReset(){
  S = defaultState(); save(); closeModal(); go("log");
  toast("まっさらになりました！");
}


/* =====================================================================
   研究用：ID入力と学習ログの送信
   ===================================================================== */
function newSessionId(){ return "s" + Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

/* 閉じられないモーダル（ID入力用） */
function openModalLocked(html){
  const r = document.getElementById("modal-root");
  r.innerHTML = `<div class="mback"></div><div class="mbox">${html}</div>`;
  r.classList.add("show","locked");
}
function closeModalLocked(){
  document.getElementById("modal-root").classList.remove("show","locked");
}

function askStudyId(){
  const g = S.sid || {};
  const opt = (n, sel, unit) => Array.from({length:n}, (_,i)=>
    `<option value="${i+1}" ${String(sel)===String(i+1)?"selected":""}>${i+1}${unit}</option>`).join("");
  const numField = (id, label, val) =>
    `<div class="sidfield"><label>${label}</label>
       <input type="number" id="${id}" inputmode="numeric" min="1" max="50" placeholder="番号" value="${val||""}"></div>`;
  openModalLocked(`
    <div style="text-align:center; font-size:38px;">📋</div>
    <div class="h1" style="text-align:center; font-size:20px;">はじめに入力してください</div>
    <p style="text-align:center; margin-top:6px;"><span class="studychip">${STUDY_GROUPS[STUDY].name}</span></p>
    <div class="sidform">
      <div class="sidrow">
        <div class="sidfield"><label>学年</label>
          <select id="sid-grade"><option value="">えらぶ</option>${opt(3, g.grade, "年")}</select></div>
        <div class="sidfield"><label>クラス</label>
          <select id="sid-cls"><option value="">えらぶ</option>${opt(9, g.cls, "組")}</select></div>
      </div>
      <div class="sidrow">
        ${PAIR_ID
          ? numField("sid-no1","出席番号（1人目）", g.no1) + numField("sid-no2","出席番号（2人目）", g.no2)
          : numField("sid-no1","出席番号", g.no1)}
      </div>
      <div class="siderr" id="sid-err"></div>
      <div class="sidnote">📨 学習のきろく（得点や操作）は先生に送られます。<b>名前は送りません。</b>${PAIR_ID?"<br>2人で1台を使うので、2人分の出席番号を入れてください。":""}</div>
      <button class="btn wide pink" style="margin-top:12px;" onclick="setStudyId()">はじめる</button>
    </div>`);
  setTimeout(()=>{ const el=document.getElementById("sid-grade"); if(el) el.focus(); }, 120);
}

function setStudyId(){
  const err = document.getElementById("sid-err");
  const grade = document.getElementById("sid-grade").value;
  const cls = document.getElementById("sid-cls").value;
  const no1 = document.getElementById("sid-no1").value.trim();
  const no2El = document.getElementById("sid-no2");
  const no2 = no2El ? no2El.value.trim() : "";
  const okNum = v => v !== "" && Number(v) >= 1 && Number(v) <= 50;
  if(!grade || !cls){ err.textContent = "学年とクラスをえらんでください"; return; }
  if(!okNum(no1)){ err.textContent = "出席番号を1〜50で入れてください"; return; }
  if(PAIR_ID){
    if(!okNum(no2)){ err.textContent = "2人目の出席番号を1〜50で入れてください"; return; }
    if(no1 === no2){ err.textContent = "1人目と2人目の出席番号が同じです"; return; }
  }
  S.sid = {grade:Number(grade), cls:Number(cls), no1:Number(no1), no2: PAIR_ID?Number(no2):null, group:STUDY};
  if(!S.sessionId) S.sessionId = newSessionId();
  save(); logEv("sid_set", {group:STUDY, grade:S.sid.grade, cls:S.sid.cls});
  closeModalLocked();
  const who = PAIR_ID ? `${S.sid.no1}番・${S.sid.no2}番` : `${S.sid.no1}番`;
  toast(`${S.sid.grade}年${S.sid.cls}組 ${who} でスタート！`);
  sendLog(false);
  if(typeof showStory === "function" && S.game && !S.game.storySeen) setTimeout(showStory, 500);
  renderScore();
}

/* 送信データの組み立て（新しいイベントのみ差分送信） */
function buildPayload(){
  const crit = {};
  Object.entries(S.crit).forEach(([k,v])=>{
    crit[k] = {quizFirst:v.quizFirst, chalFirst:v.chalFirst, quiz:v.quiz, challenge:v.challenge,
               quizTry:v.quizTry, chalTry:v.chalTry};
  });
  const from = S.sentCount || 0;
  return {
    study: STUDY, edition: APP_EDITION,
    sid: S.sid, sessionId: S.sessionId,
    firstScore: (typeof firstScore === "function" ? firstScore() : null),
    score: totalScore(),
    allDone: allBulbsDone(),
    practice: S.practice,
    crit: crit,
    createdAt: S.createdAt, updatedAt: S.updatedAt,
    eventFrom: from, events: S.events.slice(from), eventTotal: S.events.length,
    clientAt: new Date().toISOString()
  };
}

let _sending = false, _pending = false, _pendingManual = false;
async function sendLog(manual){
  if(!STUDY_ON || !S.sid) return;
  if(!GAS_URL){
    if(manual) toast("⚠️ 送信先が設定されていません（先生用：GAS_URL）", 3200);
    return;
  }
  /* 送信中に呼ばれたら、取りこぼさないよう終了後に送り直す */
  if(_sending){ _pending = true; if(manual){ _pendingManual = true; toast("📨 送信中です…"); } return; }
  if(!manual && (S.sentCount || 0) >= S.events.length) return;   /* 新しい記録がなければ送らない */
  _sending = true;
  const n = S.events.length;
  const payload = buildPayload();
  try{
    await fetch(GAS_URL, {
      method: "POST",
      headers: {"Content-Type": "text/plain;charset=utf-8"},  /* CORSプリフライトを避ける */
      body: JSON.stringify(payload)
    });
    S.sentCount = n; S.lastSentAt = new Date().toISOString(); save();
    if(manual) toast("✅ 先生に送信しました");
    if(screenName === "log") renderLog();
  }catch(e){
    if(manual) toast("⚠️ 送信できませんでした。電波を確認して、もう一度お試しください", 3600);
  }finally{
    _sending = false;
    /* 送信中に増えた記録や、待たされた要求があれば続けて送る */
    const more = _pending || (S.sentCount || 0) < S.events.length;
    const m = _pendingManual;
    _pending = false; _pendingManual = false;
    if(more) setTimeout(()=>sendLog(m), 400);
  }
}

/* 自動送信：60秒ごと＋画面を閉じるとき */
function startAutoSend(){
  if(!STUDY_ON) return;
  setInterval(()=>sendLog(false), 60000);
  window.addEventListener("pagehide", ()=>{
    try{
      if(!GAS_URL || !S.sid) return;
      if((S.sentCount || 0) >= S.events.length) return;
      const blob = new Blob([JSON.stringify(buildPayload())], {type:"text/plain;charset=utf-8"});
      navigator.sendBeacon(GAS_URL, blob);
    }catch(e){}
  });
}

/* 送信内容の確認（先生・生徒への透明性のため） */
function showPayloadPreview(){
  const p = buildPayload();
  const pretty = JSON.stringify(p, null, 1);
  const head = pretty.length > 4000 ? pretty.slice(0, 4000) + "\n…（以下省略）" : pretty;
  openModal(`<div class="h2">📨 送信される内容</div>
    <p class="small" style="margin:8px 0;">氏名は含まれません。学年・クラス・出席番号と、学習の得点・操作の記録が送られます。</p>
    <pre style="background:#f8fafc; border:1px solid var(--line); border-radius:10px; padding:12px;
      font-size:11px; line-height:1.6; overflow-x:auto; white-space:pre-wrap; word-break:break-all;">${esc(head)}</pre>`);
}

/* きろく画面に出す研究用カード */
function studyCardHTML(){
  if(!STUDY_ON) return "";
  const sid = S.sid;
  const who = sid ? (sid.no2 ? `${sid.no1}番・${sid.no2}番` : `${sid.no1}番`) : "未入力";
  const unsent = Math.max(0, S.events.length - (S.sentCount || 0));
  const last = S.lastSentAt ? S.lastSentAt.slice(0,16).replace("T"," ") : "まだ送信していません";
  return `<div class="card" style="border:3px solid var(--accent2);">
    <div class="h2">📨 研究用：先生へのきろくの送信</div>
    <div class="small" style="line-height:2;">
      <b>${esc(STUDY_GROUPS[STUDY].name)}</b><br>
      ${sid ? `${sid.grade}年 ${sid.cls}組 ${who}` : "IDが未入力です"}
      <a href="#" style="font-size:12px;" onclick="askStudyId();return false;">変更</a><br>
      最終送信：${last}／未送信の記録：${unsent}件
      ${GAS_URL ? "" : '<br><b style="color:#dc2626;">※送信先URLが未設定です（先生用の設定が必要）</b>'}
    </div>
    <button class="btn wide" style="margin-top:10px;" onclick="sendLog(true)">📨 いま送信する</button>
    <button class="btn ghost wide" style="margin-top:8px;" onclick="showPayloadPreview()">🔍 送信される内容を見る</button>
  </div>`;
}

/* =====================================================================
   起動
   ===================================================================== */
logEv("app_open");
go("home");
if(STUDY_ON){
  startAutoSend();
  if(!S.sid) setTimeout(askStudyId, 400);
} else if(!S.name && S.events.filter(e=>e.type==="app_open").length<=1){
  setTimeout(askName, 700);
} else if(preGateLocked()){
  setTimeout(promptPretest, 700);
}
</script>
